lambda: event

event:
  mode:
    debug: true

dynamic:
  environment:
    toolchain:
      os: windows10.0.26200.0
      arch: amd64v1
      compiler: node26.2.0
      variant: full
    warehouse:
      local: /tmp/app-event/warehouse
      remote: s3://lambda-node-app-event
  package:
    namespace: app
    defaultVersion: v1
    preload:
      - package: appfull
        version: v1
