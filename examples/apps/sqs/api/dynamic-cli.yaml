environments:
  - name: node-full
    toolchain:
      os: linux
      arch: amd64
      compiler: node
      variant: full
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-sqs
  - name: node-bundle
    toolchain:
      os: linux
      arch: amd64
      compiler: node
      variant: bundle
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-sqs

procedures:
  - name: appfull
    environment: node-full
    source:
      module: .
      package: packages/appfull
      version: v1
    target:
      namespace: app
      package: appfull
      version: v1
  - name: appbundle
    environment: node-bundle
    source:
      module: .
      package: packages/appbundle
      version: v1
    target:
      namespace: app
      package: appbundle
      version: v1
