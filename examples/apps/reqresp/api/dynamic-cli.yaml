environments:
  - name: node-full
    toolchain:
      os: windows10.0.26200.0
      arch: amd64v1
      compiler: node26.2.0
      variant: full
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-reqresp
  - name: node-bundle
    toolchain:
      os: windows10.0.26200.0
      arch: amd64v1
      compiler: node26.2.0
      variant: bundle
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-reqresp

procedures:
  - name: appfull
    environment: node-full
    source:
      module: .
      package: packages/appfull
      version: v1
    target:
      namespace: app
      package: appfull
      version: v1
  - name: appbundle
    environment: node-bundle
    source:
      module: .
      package: packages/appbundle
      version: v1
    target:
      namespace: app
      package: appbundle
      version: v1
