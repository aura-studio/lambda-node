environments:
  - name: node-full
    toolchain:
      os: windows10.0.26200.0
      arch: amd64v1
      compiler: node26.2.0
      variant: full
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-http
  - name: node-bundle
    toolchain:
      os: windows10.0.26200.0
      arch: amd64v1
      compiler: node26.2.0
      variant: bundle
    warehouse:
      local: ../lambda/.tmp/warehouse
      remote:
        - s3://lambda-node-app-http

procedures:
  - name: apifull
    environment: node-full
    source:
      module: .
      package: packages/apifull
      version: v1
    target:
      namespace: app
      package: apifull
      version: v1
  - name: wapifull
    environment: node-full
    source:
      module: .
      package: packages/wapifull
      version: v1
    target:
      namespace: app
      package: wapifull
      version: v1
  - name: apibundle
    environment: node-bundle
    source:
      module: .
      package: packages/apibundle
      version: v1
    target:
      namespace: app
      package: apibundle
      version: v1
  - name: wapibundle
    environment: node-bundle
    source:
      module: .
      package: packages/wapibundle
      version: v1
    target:
      namespace: app
      package: wapibundle
      version: v1
