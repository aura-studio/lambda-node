lambda: http

http:
  address: ":3000"
  mode:
    debug: true
    cors: true
  staticLink:
    - srcPath: "/greet"
      dstPath: "/api/greeter/v1/greet"
      methods: ["POST"]
    - srcPath: "/hello"
      dstPath: "/wapi/web/v1/hello"
      methods: ["GET"]
  prefixLink:
    - srcPrefix: "/v2"
      dstPrefix: "/api/greeter/v1"
      methods: ["GET", "POST"]
    - srcPrefix: "/web"
      dstPrefix: "/wapi/web/v1"
      methods: ["GET", "POST"]
  pageNotFound:
    - path: "/health-check"
      methods: ["GET"]

dynamic:
  package:
    namespace: aura
    defaultVersion: v1
    basePath: ./examples/http/packages
